<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>패치노트 — 모찌서버</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--pink:#f4849e;--pd:#e8607e;--peach:#f9a87a;--card:rgba(255,255,255,.06);--cb:rgba(244,132,158,.15);--mu:rgba(255,255,255,.45);--r:16px}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans KR',sans-serif;background:#1a0f12;color:#fff;font-weight:300;min-height:100vh}

#bgWrap{position:fixed;inset:0;z-index:0;background:#1a0f12}
#bgVideo,#bgImage{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none}
#bgOverlay{position:absolute;inset:0;background:linear-gradient(160deg,rgba(26,10,18,.82) 0%,rgba(40,12,22,.78) 100%);backdrop-filter:blur(2px)}
nav,.page-header,.main,footer{position:relative;z-index:10}

nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 48px;height:68px;background:rgba(20,8,14,.55);backdrop-filter:blur(20px);border-bottom:1px solid rgba(244,132,158,.15)}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-logo img{width:38px;height:38px;border-radius:10px;object-fit:cover;display:none}
.nav-logo-text{font-family:'Nunito',sans-serif;font-size:20px;font-weight:900;background:linear-gradient(135deg,var(--pd),var(--peach));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-links{display:flex;gap:28px;list-style:none;align-items:center}
.nav-links a{font-size:13px;color:rgba(255,255,255,.6);text-decoration:none;transition:color .2s}
.nav-links a:hover,.nav-links a.active{color:#fff}
.nav-cta{background:linear-gradient(135deg,var(--pink),var(--peach))!important;color:#fff!important;padding:9px 22px;border-radius:100px;font-size:13px!important;font-weight:700!important;box-shadow:0 4px 20px rgba(244,132,158,.4)}

.page-header{padding:120px 48px 48px;background:rgba(20,8,14,.5);border-bottom:1px solid rgba(244,132,158,.1);backdrop-filter:blur(8px)}
.page-header-inner{max-width:1100px;margin:0 auto}
.page-label{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--pink);font-weight:600;margin-bottom:10px}
.page-title{font-family:'Nunito',sans-serif;font-size:clamp(32px,4vw,52px);font-weight:900;letter-spacing:-.02em;margin-bottom:10px}
.page-desc{font-size:14px;color:var(--mu);line-height:1.7}

.main{max-width:1100px;margin:0 auto;padding:40px 48px 80px;display:grid;grid-template-columns:260px 1fr;gap:32px}

/* 사이드바 */
.sidebar{position:sticky;top:88px;align-self:start;display:flex;flex-direction:column;gap:8px}
.patch-item{background:var(--card);border:1px solid var(--cb);border-radius:var(--r);padding:16px 18px;cursor:pointer;transition:border-color .2s,background .2s;position:relative;backdrop-filter:blur(8px)}
.patch-item:hover{background:rgba(255,255,255,.09);border-color:rgba(244,132,158,.3)}
.patch-item.active{border-color:var(--pink);background:rgba(244,132,158,.1)}
.patch-item.active::before{content:'';position:absolute;left:-1px;top:12px;bottom:12px;width:3px;border-radius:2px;background:linear-gradient(180deg,var(--pink),var(--peach))}
.patch-ver{font-family:'Nunito',sans-serif;font-size:16px;font-weight:800;margin-bottom:3px}
.patch-date{font-size:12px;color:var(--mu)}
.patch-tags-mini{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
.tag-mini{padding:2px 8px;border-radius:100px;font-size:10px;font-weight:600}
.tag-new{background:rgba(46,125,50,.3);color:#81c784}.tag-fix{background:rgba(230,126,34,.2);color:#f0a040}
.tag-change{background:rgba(244,132,158,.2);color:var(--pink)}.tag-remove{background:rgba(192,57,43,.2);color:#ff7c7c}

/* 콘텐츠 */
.patch-content{background:var(--card);border:1px solid var(--cb);border-radius:var(--r);padding:40px;min-height:360px;backdrop-filter:blur(8px);animation:fi .25s ease}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.pc-header{margin-bottom:32px;padding-bottom:24px;border-bottom:1px solid rgba(244,132,158,.12)}
.pc-ver{font-family:'Nunito',sans-serif;font-size:30px;font-weight:900;margin-bottom:6px}
.pc-date{font-size:13px;color:var(--mu);margin-bottom:16px}
.pc-tags{display:flex;gap:8px;flex-wrap:wrap}
.tag{padding:4px 12px;border-radius:100px;font-size:11px;font-weight:600;letter-spacing:.04em}

/* 블록 렌더 */
.pc-list{list-style:none;display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.pc-list li{
  font-size:14px;line-height:1.65;padding:12px 16px;
  background:rgba(255,255,255,.04);border-radius:10px;
  border-left:3px solid var(--pink);color:rgba(255,255,255,.88);
}
/* 이미지 블록 */
.pc-img-block{
  margin:16px 0;
  display:flex;justify-content:center;
}
.pc-img-block img{
  max-width:100%;max-height:400px;
  border-radius:12px;
  border:1px solid rgba(244,132,158,.15);
  cursor:zoom-in;
  transition:transform .2s,box-shadow .2s;
  object-fit:contain;
}
.pc-img-block img:hover{box-shadow:0 8px 32px rgba(0,0,0,.4)}
/* 이미지 확대 */
.pc-img-block img.zoomed{
  position:fixed;inset:0;z-index:9999;
  max-width:95vw;max-height:95vh;
  margin:auto;border-radius:16px;
  cursor:zoom-out;
  box-shadow:0 0 0 9999px rgba(0,0,0,.85);
  transform:none!important;
}

.loading{text-align:center;padding:60px 20px;color:var(--mu);font-size:14px}

/* 푸터 */
footer{background:rgba(10,4,8,.85);border-top:1px solid rgba(244,132,158,.1);backdrop-filter:blur(20px);padding:40px 48px 32px;text-align:center}
.footer-sns{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:24px}
.sns-btn{width:40px;height:40px;border-radius:10px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.5);text-decoration:none;transition:background .2s,border-color .2s,color .2s;font-size:18px}
.sns-btn:hover{background:rgba(244,132,158,.15);border-color:rgba(244,132,158,.4);color:var(--pink)}
.footer-divider{display:flex;align-items:center;justify-content:center;gap:24px;margin-bottom:20px}
.footer-divider a{font-size:12px;color:rgba(255,255,255,.4);text-decoration:none;transition:color .2s}
.footer-divider a:hover{color:rgba(255,255,255,.7)}
.footer-divider span{color:rgba(255,255,255,.15);font-size:12px}
.footer-biz{font-size:11px;color:rgba(255,255,255,.25);line-height:1.9;margin-bottom:20px}
.footer-biz span{margin:0 8px}
.footer-copy{font-size:11px;color:rgba(255,255,255,.2)}

::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(244,132,158,.3);border-radius:3px}
@media(max-width:768px){
  nav{padding:0 20px}.nav-links li:not(:last-child){display:none}
  .page-header{padding:100px 20px 36px}
  .main{padding:24px 20px 60px;grid-template-columns:1fr;gap:20px}
  .sidebar{position:static;flex-direction:row;overflow-x:auto}
  .patch-item{min-width:140px}
  footer{padding:32px 20px 24px}
}
</style>
</head>
<body>
<div id="bgWrap">
  <video id="bgVideo" autoplay muted loop playsinline></video>
  <img id="bgImage" alt="배경">
  <div id="bgOverlay"></div>
</div>

<nav>
  <a href="index.html" class="nav-logo">
    <img id="navIcon" alt="모찌">
    <span class="nav-logo-text">모찌서버</span>
  </a>
  <ul class="nav-links">
    <li><a href="patchnote.html" class="active">패치노트</a></li>
    <li><a href="https://mochi-fivem.gitbook.io/mochi-docs" target="_blank">서버 법률 📋</a></li>
    <li><a href="fivem://connect/fivem-mochi.kr" class="nav-cta">서버 입장 🐾</a></li>
  </ul>
</nav>

<div class="page-header">
  <div class="page-header-inner">
    <div class="page-label">업데이트 로그</div>
    <h1 class="page-title">패치노트</h1>
    <p class="page-desc">모찌서버의 업데이트 내역을 확인하세요.</p>
  </div>
</div>

<div class="main">
  <div class="sidebar" id="sidebar"><div class="loading">불러오는 중...</div></div>
  <div class="patch-content" id="patchContent"><div class="loading">불러오는 중...</div></div>
</div>

<footer>
  <div class="footer-biz">
    상호 후콩컴퍼니<span>|</span>대표 이상훈<span>|</span>사업자등록번호 265-04-03785<br>
    주소 경상남도 김해시 경원로73번길 1, 6층<span>
  </div>
  <div class="footer-copy">© 2026 모찌서버. All rights reserved.</div>
</footer>

<script type="module">
const tagMeta={
  new:{cls:'tag-new',label:'신규'},fix:{cls:'tag-fix',label:'버그수정'},
  change:{cls:'tag-change',label:'변경'},remove:{cls:'tag-remove',label:'삭제'}
};
let patches=[],selectedIdx=0;

async function init(){
  try{
    const res=await fetch('/.netlify/functions/config');
    const cfg=await res.json();
    const{initializeApp}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
    const{getFirestore,collection,getDocs,orderBy,query}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    const{getStorage,ref,getDownloadURL}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js');
    const app=initializeApp(cfg);
    const db=getFirestore(app);
    const storage=getStorage(app);

    // 아이콘
    try{
      const url=await getDownloadURL(ref(storage,'site/icon.png'));
      const el=document.getElementById('navIcon');
      if(el){el.src=url;el.style.display='';}
    }catch{}

    // 배경 (영상 우선, 없으면 이미지)
    try{
      const vUrl=await getDownloadURL(ref(storage,'site/bg_video.mp4'));
      const vid=document.getElementById('bgVideo');vid.src=vUrl;vid.style.display='block';
    }catch{
      try{
        const iUrl=await getDownloadURL(ref(storage,'site/bg_image.jpg'));
        const img=document.getElementById('bgImage');img.src=iUrl;img.style.display='block';
      }catch{}
    }

    // 패치노트 Firestore 로드
    try{
      const q=query(collection(db,'patches'),orderBy('createdAt','desc'));
      const snap=await getDocs(q);
      patches=snap.docs.map(d=>({id:d.id,...d.data()}));
    }catch{patches=[];}

    renderSidebar();
    renderContent();
  }catch{
    document.getElementById('sidebar').innerHTML='<div class="loading">로드 실패</div>';
    document.getElementById('patchContent').innerHTML='<div class="loading">데이터를 불러오지 못했습니다.</div>';
  }
}

function renderSidebar(){
  const el=document.getElementById('sidebar');
  if(!patches.length){el.innerHTML='<div class="loading">등록된 패치노트가 없습니다.</div>';return;}
  el.innerHTML=patches.map((p,i)=>`
    <div class="patch-item ${i===selectedIdx?'active':''}" onclick="window._sel(${i})">
      <div class="patch-ver">${p.ver||''}</div>
      <div class="patch-date">${p.date||''}</div>
      <div class="patch-tags-mini">
        ${(p.tags||[]).map(t=>`<span class="tag-mini ${tagMeta[t]?.cls||''}">${tagMeta[t]?.label||t}</span>`).join('')}
      </div>
    </div>`).join('');
}

function renderContent(){
  const el=document.getElementById('patchContent');
  if(!patches.length){el.innerHTML='<div class="loading">📋 아직 등록된 패치노트가 없어요.</div>';return;}
  const p=patches[selectedIdx];
  const blocks=p.blocks||[];

  // 블록 배열을 순서대로 렌더링 (텍스트/이미지 섞여있어도 작성 순서 그대로)
  let html='';
  let inList=false;
  blocks.forEach(b=>{
    if(b.type==='text'){
      if(!inList){html+='<ul class="pc-list">';inList=true;}
      html+=`<li>${b.text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/\n/g,'<br>')}</li>`;
    } else if(b.type==='image'&&b.url){
      if(inList){html+='</ul>';inList=false;}
      html+=`<div class="pc-img-block"><img src="${b.url}" alt="패치 이미지" loading="lazy" onclick="this.classList.toggle('zoomed')"></div>`;
    }
  });
  if(inList) html+='</ul>';
  if(!blocks.length) html='<div class="loading" style="padding:20px 0;font-size:13px;text-align:left">내용이 없습니다.</div>';

  el.innerHTML=`
    <div class="pc-header">
      <div class="pc-ver">${p.ver||''}</div>
      <div class="pc-date">${p.date||''}</div>
      <div class="pc-tags">${(p.tags||[]).map(t=>`<span class="tag ${tagMeta[t]?.cls||''}">${tagMeta[t]?.label||t}</span>`).join('')}</div>
    </div>
    ${html}`;
  el.style.animation='none';el.offsetHeight;el.style.animation='';

  // 확대된 이미지 ESC로 닫기
  document.onkeydown=e=>{
    if(e.key==='Escape') document.querySelectorAll('.pc-img-block img.zoomed').forEach(i=>i.classList.remove('zoomed'));
  };
}

window._sel=(idx)=>{selectedIdx=idx;renderSidebar();renderContent();};
init();
</script>
</body>
</html>
